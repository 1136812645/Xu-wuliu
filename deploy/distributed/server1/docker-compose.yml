services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api-1

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  api-1:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      INSTANCE_ID: api-1
      PORT: 3000
      DB_HOST: 192.168.5.82
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: waybill_admin
      REDIS_HOST: 192.168.5.82
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://waybill:waybill123@192.168.5.82:5672
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
