version: '3.9'

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api-1
      - api-2

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api-1
      - api-2

  api-1:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      INSTANCE_ID: api-1
      PORT: 3000
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-1}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-waybill-auth-session-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_ADMIN_EMAILS: ${GOOGLE_ADMIN_EMAILS:-admin@example.com}
      GOOGLE_CARRIER_EMAILS: ${GOOGLE_CARRIER_EMAILS:-carrier@example.com}
      GOOGLE_SHIPPER_EMAILS: ${GOOGLE_SHIPPER_EMAILS:-shipper@example.com}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: waybill_admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://waybill:waybill123@rabbitmq:5672
      RABBITMQ_EVENT_EXCHANGE: waybill.events.x
      RABBITMQ_RETRY_EXCHANGE: waybill.events.retry.x
      RABBITMQ_DLX_EXCHANGE: waybill.events.dlx
      RABBITMQ_EVENT_QUEUE: waybill.events.q
      RABBITMQ_RETRY_QUEUE: waybill.events.retry.q
      RABBITMQ_DLQ_QUEUE: waybill.events.dlq
      RABBITMQ_EVENT_ROUTING_KEY: waybill.status.changed
      RABBITMQ_RETRY_ROUTING_KEY: waybill.status.changed.retry
      RABBITMQ_RETRY_DELAY_MS: 10000
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - rabbitmq
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  api-2:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      INSTANCE_ID: api-2
      PORT: 3000
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-1}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-waybill-auth-session-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_ADMIN_EMAILS: ${GOOGLE_ADMIN_EMAILS:-admin@example.com}
      GOOGLE_CARRIER_EMAILS: ${GOOGLE_CARRIER_EMAILS:-carrier@example.com}
      GOOGLE_SHIPPER_EMAILS: ${GOOGLE_SHIPPER_EMAILS:-shipper@example.com}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: waybill_admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://waybill:waybill123@rabbitmq:5672
      RABBITMQ_EVENT_EXCHANGE: waybill.events.x
      RABBITMQ_RETRY_EXCHANGE: waybill.events.retry.x
      RABBITMQ_DLX_EXCHANGE: waybill.events.dlx
      RABBITMQ_EVENT_QUEUE: waybill.events.q
      RABBITMQ_RETRY_QUEUE: waybill.events.retry.q
      RABBITMQ_DLQ_QUEUE: waybill.events.dlq
      RABBITMQ_EVENT_ROUTING_KEY: waybill.status.changed
      RABBITMQ_RETRY_ROUTING_KEY: waybill.status.changed.retry
      RABBITMQ_RETRY_DELAY_MS: 10000
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - rabbitmq
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: waybill_admin
    ports:
      - '${MYSQL_PUBLISHED_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: waybill
      RABBITMQ_DEFAULT_PASS: waybill123
    ports:
      - '5672:5672'
      - '15672:15672'

volumes:
  mysql-data:
